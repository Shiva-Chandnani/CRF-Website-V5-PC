<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://esm.sh https://assets.calendly.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' data: https://*.supabase.co https://placehold.co;
  media-src 'self';
  connect-src 'self' https://*.supabase.co wss://*.supabase.co;
  frame-src https://calendly.com;
  form-action 'self';
  base-uri 'self';
  object-src 'none';
">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Order confirmation — Country Road Fashions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Raleway:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="preload" as="fetch" href="/components/header.html" crossorigin>
<link rel="preload" as="fetch" href="/components/footer.html" crossorigin>
<link rel="stylesheet" href="/css/base.css">
<style>
  :root { --color-jet:#0E0F11; --color-charcoal:#1A1B1F; }
</style>
<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/search-overlay.js"></script>
<script type="module" src="/js/auth.js"></script>
<style>
  /* ── Page shell ──────────────────────────────────────────────── */
  .confirm-page {
    max-width: 680px;
    margin: 0 auto;
    padding: var(--space-8) var(--space-6) var(--space-9);
  }

  /* ── Eyebrow ─────────────────────────────────────────────────── */
  .confirm-eyebrow {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: var(--color-muted);
    margin: 0 0 var(--space-4);
  }

  /* ── Headline ────────────────────────────────────────────────── */
  .confirm-headline {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: clamp(36px, 5vw, 56px);
    line-height: var(--leading-tight);
    letter-spacing: var(--tracking-tight);
    color: var(--color-jet);
    margin: 0 0 var(--space-4);
  }

  /* The italic state-word with stone hairline — matches cart.html's .cart-title em treatment */
  .confirm-headline em {
    font-style: italic;
    position: relative;
    padding-bottom: 4px;
  }
  .confirm-headline em::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -5px;
    height: 1px;
    background: var(--color-stone);
  }

  /* ── Status line ─────────────────────────────────────────────── */
  .confirm-status {
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: var(--leading-body);
    color: var(--color-ink);
    margin: 0 0 var(--space-6);
    max-width: 52ch;
  }

  /* ── Divider ─────────────────────────────────────────────────── */
  .confirm-rule {
    border: 0;
    border-top: 1px solid var(--color-rule);
    margin: var(--space-6) 0;
  }

  /* ── Docket card ─────────────────────────────────────────────── */
  .docket {
    background: var(--color-white);
    border: 1px solid var(--color-rule);
    box-shadow: var(--shadow-2);
    padding: 0;
    margin-bottom: var(--space-6);
  }

  .docket-header {
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--color-rule);
    background: var(--color-cream);
  }
  .docket-header__label {
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--color-muted);
    margin: 0;
  }

  .docket-body {
    padding: 0 var(--space-5);
  }

  /* Line items */
  .docket-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-5);
    padding: var(--space-4) 0;
    border-bottom: 1px solid var(--color-rule);
  }
  .docket-row:last-child {
    border-bottom: 0;
  }

  .docket-row__name {
    font-family: var(--font-serif);
    font-size: 16px;
    color: var(--color-jet);
    line-height: 1.3;
  }
  .docket-row__qty {
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--color-muted);
    letter-spacing: 0.04em;
    margin-left: var(--space-2);
  }
  .docket-row__price {
    font-family: var(--font-serif);
    font-size: 16px;
    color: var(--color-jet);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Total row — ruled + weighted */
  .docket-row--total {
    background: var(--color-cream);
    margin: 0 calc(-1 * var(--space-5));
    padding: var(--space-4) var(--space-5);
    border-top: 1px solid var(--color-rule);
    border-bottom: 0;
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--color-jet);
    letter-spacing: var(--tracking-tight);
  }

  /* ── CTAs ────────────────────────────────────────────────────── */
  .confirm-ctas {
    display: flex;
    gap: var(--space-4);
    flex-wrap: wrap;
  }
  .confirm-ctas .btn {
    min-width: 180px;
  }
  .confirm-ctas .btn:focus-visible {
    outline: 2px solid var(--color-jet);
    outline-offset: 3px;
  }
  .confirm-ctas .btn:active {
    transform: translateY(0);
  }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 540px) {
    .confirm-page {
      padding: var(--space-6) var(--space-4) var(--space-8);
    }
    .confirm-ctas {
      flex-direction: column;
    }
    .confirm-ctas .btn {
      width: 100%;
      min-width: 0;
    }
  }

  /* ── Reduced motion ─────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .confirm-headline em::after {
      transition: none;
    }
  }
</style>
</head>
<body>
  <div data-layout="header" style="min-height:72px;background:var(--color-jet);"></div>

  <main class="confirm-page" aria-labelledby="confirm-title">
    <p class="confirm-eyebrow">Country Road Fashions</p>

    <h1 class="confirm-headline" id="confirm-title" data-order-title>Confirming your order…</h1>

    <p class="confirm-status" data-order-status aria-live="polite"></p>

    <hr class="confirm-rule">

    <!-- Docket — hidden until the order loads -->
    <div class="docket" data-order-summary hidden aria-label="Order summary">
      <div class="docket-header">
        <p class="docket-header__label">Order Summary</p>
      </div>
      <div class="docket-body">
        <!-- line items and total injected by script -->
      </div>
    </div>

    <nav class="confirm-ctas" aria-label="Next steps">
      <a href="shop.html" class="btn btn--ghost">Continue Shopping</a>
      <a href="account.html" class="btn btn--primary">View Account</a>
    </nav>
  </main>

  <div data-layout="footer"></div>

  <script type="module">
    import { requireAuth, getSupabase } from '/js/auth.js';
    await requireAuth({ redirectTo: '/login.html' });
    const params = new URLSearchParams(location.search);
    const orderId = params.get('order');
    const sb = getSupabase();
    const titleEl = document.querySelector('[data-order-title]');
    const statusEl = document.querySelector('[data-order-status]');
    const summaryEl = document.querySelector('[data-order-summary]');
    const fmtTHB = (n) => 'THB ' + Number(n).toLocaleString('en-US');
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    function renderSummary(order) {
      summaryEl.hidden = false;
      const body = summaryEl.querySelector('.docket-body');
      body.innerHTML = (order.items || []).map(li => `
        <div class="docket-row">
          <span class="docket-row__name">${esc(li.display_name ?? li.fabric_design_id)} <span class="docket-row__qty">× ${li.qty}</span></span>
          <span class="docket-row__price">${fmtTHB(li.line_total_thb ?? (li.unit_price_thb * li.qty))}</span>
        </div>`).join('') +
        `<div class="docket-row docket-row--total"><span>Total</span><span>${fmtTHB(order.total_thb)}</span></div>`;
    }

    async function load(attempt = 0) {
      if (!orderId) {
        titleEl.textContent = 'Order not found';
        statusEl.textContent = 'Missing order reference.';
        return;
      }
      const { data: order } = await sb.from('orders').select('status,total_thb,items').eq('id', orderId).maybeSingle();
      if (!order) {
        titleEl.textContent = 'Order not found';
        statusEl.textContent = 'We could not find this order on your account.';
        return;
      }
      if (order.status === 'paid') {
        renderSummary(order);
        titleEl.innerHTML = 'Your order is <em>confirmed</em>';
        statusEl.textContent = 'We\'ve received your payment and will be in touch to arrange your fitting.';
      } else if (order.status === 'pending' && attempt < 5) {
        setTimeout(() => load(attempt + 1), 1500); // webhook lag
      } else if (order.status === 'pending') {
        renderSummary(order);
        titleEl.textContent = 'Payment processing';
        statusEl.textContent = 'Your payment is still processing. We\'ll email you once it\'s confirmed.';
      } else {
        titleEl.textContent = 'Payment not completed';
        statusEl.textContent = 'This order was not paid. You can try checking out again from your cart.';
      }
    }
    load();
  </script>
</body>
</html>
