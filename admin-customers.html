<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- CSP: script-src is 'self'-only (all inline scripts externalized to js/*). style-src keeps 'unsafe-inline' — many inline <style> blocks, no build step; style injection is not a script-exec vector. Rationale: docs/superpowers/specs/2026-07-14-csp-rls-hardening-design.md -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://esm.sh https://assets.calendly.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' data: https://*.supabase.co https://placehold.co;
  media-src 'self';
  connect-src 'self' https://*.supabase.co wss://*.supabase.co;
  frame-src https://calendly.com;
  form-action 'self';
  base-uri 'self';
  object-src 'none';
">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Customers — CRF Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Raleway:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="preload" as="fetch" href="/components/header.html" crossorigin>
<link rel="preload" as="fetch" href="/components/footer.html" crossorigin>
<link rel="stylesheet" href="/css/base.css">
<style>
  :root { --color-jet:#0E0F11; --color-charcoal:#1A1B1F; }
</style>
<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/search-overlay.js"></script>
<script type="module" src="/js/auth.js"></script>
<style>
  .crm-shell {
    max-width: var(--container-max);
    margin: 0 auto;
    padding: var(--space-8) var(--space-6) var(--space-9);
    background: var(--color-off-white);
  }
  .crm-inner { max-width: 1120px; margin: 0 auto; }
  .crm-eyebrow {
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: var(--color-muted);
    margin: 0 0 var(--space-2);
  }
  .crm-shell h1 {
    font-family: var(--font-serif); font-weight: 500;
    font-size: clamp(32px, 4.2vw, 48px);
    line-height: var(--leading-tight);
    letter-spacing: var(--tracking-tight);
    color: var(--color-jet);
    margin: 0 0 var(--space-7);
  }

  /* --- Metrics strip --- */
  .crm-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--color-rule);
    border: 1px solid var(--color-rule);
    margin-bottom: var(--space-7);
  }
  .crm-tile {
    background: var(--color-white);
    padding: var(--space-5) var(--space-5);
    position: relative;
  }
  .crm-tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--color-stone);
    opacity: 0;
    transition: opacity var(--t-med) var(--ease-out);
  }
  .crm-tile:hover::before { opacity: 1; }
  .crm-tile .n {
    font-family: var(--font-serif); font-weight: 500;
    font-size: 2rem; line-height: 1.05;
    letter-spacing: var(--tracking-tight);
    color: var(--color-jet);
    white-space: nowrap;
  }
  .crm-tile .l {
    font-size: 11px; letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase; color: var(--color-muted);
    margin-top: var(--space-2);
  }
  .crm-metrics--error {
    grid-column: 1 / -1;
    font-size: 13px; color: var(--color-muted);
    padding: var(--space-4) 0;
  }

  /* --- Trend chart --- */
  .crm-chart {
    background: var(--color-white);
    border: 1px solid var(--color-rule);
    padding: var(--space-6) var(--space-6) var(--space-5);
    margin-bottom: var(--space-7);
  }
  .crm-chart__label {
    font-size: 11px; letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase; color: var(--color-muted);
    margin: 0 0 var(--space-4);
  }
  .crm-chart svg { display: block; width: 100%; height: auto; overflow: visible; }
  .crm-bar { fill: var(--color-charcoal); transition: fill var(--t-fast) var(--ease-out); }
  .crm-bar:hover, .crm-bar.is-active { fill: var(--color-jet); }
  .crm-bar-label { font-family: var(--font-sans); font-size: 10px; fill: var(--color-jet); font-weight: 600; }
  .crm-axis-label { font-family: var(--font-sans); font-size: 9.5px; fill: var(--color-muted); letter-spacing: 0.02em; }
  .crm-axis-line { stroke: var(--color-rule); stroke-width: 1; }
  .crm-tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--color-jet);
    color: var(--color-off-white);
    font-family: var(--font-sans);
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 6px 10px;
    box-shadow: var(--shadow-2);
    z-index: 50;
    opacity: 0;
    transform: translate(-50%, -100%);
    transition: opacity var(--t-fast) var(--ease-out);
    white-space: nowrap;
  }
  .crm-tooltip.is-visible { opacity: 1; }

  /* --- Search + table --- */
  .crm-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .crm-search { width: 100%; max-width: 380px; }
  .crm-count {
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--color-muted);
    white-space: nowrap;
  }
  .crm-table-scroll {
    background: var(--color-white);
    border: 1px solid var(--color-rule);
    overflow-x: auto;
  }
  .crm-table { width: 100%; min-width: 640px; border-collapse: collapse; }
  .crm-table th {
    text-align: left;
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: var(--color-muted);
    font-weight: 500;
    padding: var(--space-4) var(--space-4);
    border-bottom: 1px solid var(--color-rule);
    white-space: nowrap;
  }
  .crm-table td {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--color-ink);
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--color-rule);
    vertical-align: middle;
  }
  .crm-table tbody tr[data-id] {
    cursor: pointer;
    transition: background var(--t-fast) var(--ease-out);
  }
  .crm-table tbody tr[data-id]:hover,
  .crm-table tbody tr[data-id]:focus-visible {
    background: var(--color-cream);
    outline: none;
  }
  .crm-table tbody tr[data-id]:focus-visible {
    box-shadow: inset 0 0 0 2px var(--color-jet);
  }
  .crm-table .crm-name { color: var(--color-jet); font-weight: 500; }
  .crm-table .crm-muted { color: var(--color-muted); }
  .crm-source {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: var(--color-cream);
    color: var(--color-muted);
  }
  .crm-source--pos { background: rgba(31,94,63,0.10); color: #1f5e3f; }
  .crm-empty-row td {
    padding: var(--space-6) var(--space-4);
    text-align: center;
    color: var(--color-muted);
    font-size: 14px;
  }
  .crm-table-skeleton {
    padding: var(--space-6) var(--space-4);
    color: var(--color-muted);
    font-size: 14px;
  }

  @media (max-width: 640px) {
    .crm-shell { padding: var(--space-6) var(--space-4) var(--space-8); }
    .crm-search { max-width: none; }
  }
</style>
</head>
<body>
<div data-layout="header" style="min-height:72px;background:var(--color-jet);"></div>
<main class="crm-shell">
  <div class="crm-inner">
    <p class="crm-eyebrow">Staff · CRM</p>
    <h1>Customers</h1>

    <div class="crm-metrics" id="metrics"></div>

    <div class="crm-chart">
      <p class="crm-chart__label">New customers · last 12 months</p>
      <div id="chart"></div>
    </div>

    <div class="crm-toolbar">
      <input class="input crm-search" id="search" type="search" placeholder="Search name, email, or phone…" autocomplete="off" aria-label="Search customers" />
    </div>
    <div class="crm-table-scroll">
      <div id="tableWrap"></div>
    </div>
  </div>
</main>
<div data-layout="footer"></div>
<script type="module" src="/js/admin-customers-page.js"></script>
</body>
</html>
