<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product — Country Road Fashions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Raleway:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="preload" as="fetch" href="/components/header.html" crossorigin>
<link rel="preload" as="fetch" href="/components/footer.html" crossorigin>
<link rel="stylesheet" href="/css/base.css">
<style>
  /* FOUC tokens for data-layout slot reservations */
  :root { --color-jet:#0E0F11; --color-charcoal:#1A1B1F; }
</style>
<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/newsletter.js"></script>
<script type="module" src="/js/meta.js"></script>
<style>
  :root {
    --type--caps-tracking: 1.6px;
    --line-height-body: 1.65;
    --color-graphite:   #3A3D44;
    --color-grey-dark:  #4F5258;
    --color-grey-mid:   #898C92;
    --color-grey-light: #DFDFDF;
    --color-stroke-light: rgba(14,15,17,0.10);
    --color-stroke-mid:   rgba(14,15,17,0.18);
    --header-height: 64px;
    --announcement-height: 36px;
    --page-pad-x: 48px;
  }

  html, body { height: 100%; }
  body {
    font-weight: 300;
    font-size: 14px;
    line-height: var(--line-height-body);
    color: var(--color-charcoal);
    background: var(--color-white);
  }

  /* ============== BREADCRUMB ============== */
  .breadcrumb {
    padding: 18px var(--page-pad-x) 4px;
    font-size: 10.5px; text-transform: uppercase;
    letter-spacing: var(--type--caps-tracking);
    color: var(--color-grey-mid);
  }
  .breadcrumb a:hover { color: var(--color-jet); }
  .breadcrumb .sep { margin: 0 8px; color: var(--color-grey-light); }

  /* ============== MAIN LAYOUT ============== */
  .product-layout {
    display: grid;
    grid-template-columns: 90px minmax(460px, 520px) minmax(520px, 640px);
    justify-content: space-between;
    column-gap: clamp(36px, 4vw, 72px);
    padding: 14px var(--page-pad-x) 80px;
    align-items: start;
  }

  /* Thumbnail strip (left) */
  .thumb-rail {
    display: flex; flex-direction: column; gap: 12px;
    position: sticky; top: calc(var(--header-height) + 14px);
    max-height: calc(100vh - var(--header-height) - 28px);
    overflow-y: auto;
    padding-right: 4px;
    /* Soft fade at bottom indicating scroll */
    mask-image: linear-gradient(to bottom, black calc(100% - 24px), transparent);
    -webkit-mask-image: linear-gradient(to bottom, black calc(100% - 24px), transparent);
  }
  .thumb-rail::-webkit-scrollbar { width: 3px; }
  .thumb-rail::-webkit-scrollbar-thumb { background: var(--color-stroke-light); border-radius: 4px; }
  .thumb-rail button {
    width: 86px; height: 86px;
    padding: 0; background: var(--color-cream);
    border: 1px solid var(--color-stroke-light);
    cursor: pointer;
    overflow: hidden;
    transition: border-color .2s ease;
    flex-shrink: 0;
  }
  .thumb-rail button img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-rail button.is-active { border-color: var(--color-jet); box-shadow: inset 0 0 0 1px var(--color-jet); }
  .thumb-rail button:hover { border-color: var(--color-grey-dark); }

  /* Main image (center) */
  .main-image-wrap {
    position: sticky; top: calc(var(--header-height) + 14px);
    background: var(--color-cream);
    aspect-ratio: 4 / 5;
    overflow: hidden;
    border: 1px solid var(--color-stroke-light);
  }
  .main-image-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity .3s ease;
  }
  .image-caption {
    margin-top: 12px;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--color-grey-mid);
    text-align: left;
    padding: 0 2px;
  }

  /* Details panel (right) */
  .details-panel { padding-top: 2px; }
  .details-panel .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: var(--type--caps-tracking);
    color: var(--color-grey-mid);
    margin: 0 0 12px;
  }
  .product-title {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 38px;
    line-height: 1.1;
    color: var(--color-jet);
    letter-spacing: -0.012em;
    margin: 0 0 14px;
  }
  .product-title em { font-style: italic; color: var(--color-jet); position: relative; }
  .product-title em::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -3px;
    height: 1px; background: var(--color-stone);
    transform: scaleX(0.8); transform-origin: left;
  }
  .rating-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    color: var(--color-grey-dark);
    font-size: 12px;
  }
  .rating-stars { color: var(--color-jet); letter-spacing: 2px; }
  .rating-stars .ghost { color: var(--color-grey-light); }
  .rating-count { font-family: var(--font-serif); font-style: italic; color: var(--color-grey-mid); }
  .price-row {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--color-stroke-light);
  }
  .product-price {
    font-size: 17px;
    color: var(--color-jet);
    letter-spacing: 0.4px;
    font-variant-numeric: tabular-nums;
  }
  .price-note {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--color-grey-dark);
  }
  .price-note::before { content: "·"; margin: 0 6px; color: var(--color-stone); }

  /* Design label + swatch row */
  .design-label {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .design-label .label-left {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: var(--type--caps-tracking);
    color: var(--color-grey-mid);
  }
  .design-label .label-right {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 17px;
    color: var(--color-jet);
  }
  .design-swatches {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 28px;
  }
  .swatch-btn {
    width: 44px; height: 44px;
    padding: 0; border: 1px solid var(--color-stroke-light);
    background: var(--color-cream);
    overflow: hidden;
    cursor: pointer;
    transition: border-color .18s ease, transform .18s ease;
    position: relative;
  }
  .swatch-btn img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .swatch-btn:hover { border-color: var(--color-jet); }
  .swatch-btn.is-active {
    border-color: var(--color-jet);
    box-shadow: inset 0 0 0 1px var(--color-jet);
  }
  .swatch-btn.is-active::after {
    content: ""; position: absolute; inset: -5px;
    border: 1px solid var(--color-stone);
    pointer-events: none;
  }

  /* Size selectors */
  .size-select {
    display: block; width: 100%;
    appearance: none;
    background: var(--color-white);
    border: 1px solid var(--color-stroke-light);
    padding: 14px 18px;
    margin-bottom: 12px;
    font: 300 13.5px var(--font-sans);
    color: var(--color-jet);
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5l5 5 5-5' stroke='%230E0F11' stroke-width='1.4'/></svg>");
    background-repeat: no-repeat;
    background-position: right 18px center;
    transition: border-color .18s ease;
  }
  .size-select:hover, .size-select:focus { border-color: var(--color-jet); outline: none; }

  /* CTA buttons */
  .cta-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .cta-row.is-single { grid-template-columns: 1fr; }
  @media (max-width: 640px) {
    .cta-row { grid-template-columns: 1fr; }
  }
  /* page-specific CTA sizing overrides (base .btn system from base.css) */
  .cta-row .btn {
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 1.8px;
    padding: 16px 22px;
  }

  .bespoke-note {
    text-align: center;
    margin: 20px 0 0;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--color-grey-dark);
  }
  .bespoke-note::before, .bespoke-note::after {
    content: ""; display: inline-block; width: 30px; height: 1px;
    background: var(--color-stone);
    vertical-align: middle; margin: 0 12px 4px;
  }

  /* Accordions */
  .accordion { margin-top: 36px; border-top: 1px solid var(--color-stroke-light); }
  .accordion details {
    border-bottom: 1px solid var(--color-stroke-light);
  }
  .accordion summary {
    list-style: none;
    cursor: pointer;
    padding: 18px 4px 18px 0;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: var(--type--caps-tracking);
    color: var(--color-jet);
    transition: color .18s ease;
  }
  .accordion summary::-webkit-details-marker { display: none; }
  .accordion summary:hover { color: var(--color-charcoal); }
  .accordion summary::after {
    content: ""; width: 14px; height: 14px;
    background:
      linear-gradient(currentColor, currentColor) center / 12px 1px no-repeat,
      linear-gradient(currentColor, currentColor) center / 1px 12px no-repeat;
    transition: transform .25s ease, opacity .25s ease;
  }
  .accordion details[open] summary::after {
    background: linear-gradient(currentColor, currentColor) center / 12px 1px no-repeat;
  }
  .accordion .acc-body {
    padding: 4px 0 22px;
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--color-grey-dark);
  }
  .accordion .acc-body p { margin: 0 0 12px; }
  .accordion .acc-body p:last-child { margin-bottom: 0; }
  .accordion .acc-body dl { display: grid; grid-template-columns: 130px 1fr; row-gap: 8px; column-gap: 12px; margin: 4px 0 0; }
  .accordion .acc-body dt {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--color-grey-mid);
  }
  .accordion .acc-body dd { margin: 0; color: var(--color-jet); }
  .separates-list { display: grid; gap: 10px; margin: 4px 0 0; }
  .separates-list a {
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid var(--color-stroke-light);
    padding: 12px 14px;
    transition: border-color .2s ease;
  }
  .separates-list a:hover { border-color: var(--color-jet); }
  .separates-list .item { font-family: var(--font-serif); font-size: 16px; color: var(--color-jet); }
  .separates-list .item em { font-style: italic; color: var(--color-grey-dark); font-size: 13.5px; }
  .separates-list .arrow { color: var(--color-grey-mid); font-size: 18px; }

  /* ============== STATES ============== */
  .loading-state {
    padding: 80px 0; text-align: center;
    color: var(--color-grey-mid);
    font-family: var(--font-serif); font-style: italic; font-size: 18px;
  }

  /* ============== RESPONSIVE ============== */
  @media (max-width: 1100px) {
    :root { --page-pad-x: 28px; }
    .product-layout {
      grid-template-columns: 70px minmax(360px, 460px) minmax(340px, 1fr);
      justify-content: normal;
      column-gap: 24px;
    }
    .thumb-rail button { width: 64px; height: 64px; }
  }
  @media (max-width: 880px) {
    :root { --page-pad-x: 16px; }
    .product-layout {
      grid-template-columns: 1fr;
      row-gap: 28px;
    }
    .thumb-rail {
      flex-direction: row; position: static;
      overflow-x: auto; padding-bottom: 4px;
    }
    .main-image-wrap { position: static; }
    .product-title { font-size: 32px; }
    .cta-row { grid-template-columns: 1fr; }
  }

  /* ============================================================
     CUSTOMIZER DRAWER
     ============================================================ */
  .cz-backdrop {
    position: fixed; inset: 0;
    background: rgba(14, 15, 17, 0.32);
    opacity: 0;
    pointer-events: none;
    transition: opacity .32s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 80;
  }
  body.is-customizing .cz-backdrop {
    opacity: 1;
    pointer-events: auto;
  }
  body.is-customizing { overflow: hidden; }

  .cz-drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 100%; max-width: 530px;
    background: var(--color-off-white);
    transform: translateX(100%);
    transition: transform .32s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 90;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: -16px 0 32px -16px rgba(14, 15, 17, 0.14);
  }
  body.is-customizing .cz-drawer { transform: translateX(0); }

  .cz-panels {
    flex: 1 1 auto;
    display: flex;
    height: 100%;
    overflow: hidden;
  }
  .cz-panel {
    flex: 1 0 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .cz-header {
    display: grid;
    grid-template-columns: 32px 1fr 32px;
    align-items: center;
    gap: 12px;
    padding: 20px 28px 18px;
    border-bottom: 1px solid var(--color-stroke-light);
    background: var(--color-off-white);
    position: sticky; top: 0; z-index: 2;
  }
  .cz-header > .cz-title { grid-column: 2; text-align: center; }
  .cz-header:not(.cz-header--detail) > .cz-title { grid-column: 1 / 3; text-align: left; padding-left: 0; }
  .cz-header:not(.cz-header--detail) > .cz-close { grid-column: 3; justify-self: end; }
  .cz-title {
    font-family: var(--font-sans);
    font-size: 11.5px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--color-jet);
    margin: 0;
  }
  .cz-close, .cz-back {
    background: none; border: 0; padding: 6px;
    color: var(--color-jet);
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color .2s ease;
  }
  .cz-close:hover, .cz-back:hover { background: var(--color-cream); }

  .cz-context {
    padding: 22px 28px;
    border-bottom: 1px solid var(--color-stroke-light);
    background: var(--color-white);
  }
  .cz-context-eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--color-grey-mid);
    margin: 0 0 4px;
  }
  .cz-context-value {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 18px;
    color: var(--color-jet);
    margin: 0;
  }

  .cz-rows {
    flex: 1 1 auto;
    padding-bottom: 18px;
    background: var(--color-white);
  }
  .cz-group {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--color-stone);
    padding: 22px 28px 8px;
    margin: 0;
  }
  .cz-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 14px;
    align-items: center;
    width: 100%;
    background: none; border: 0;
    padding: 16px 28px;
    text-align: left;
    border-top: 1px solid var(--color-stroke-light);
    transition: background-color .15s ease;
    cursor: pointer;
  }
  .cz-row:hover { background: var(--color-cream); }
  .cz-row-label {
    font-size: 13.5px;
    color: var(--color-jet);
  }
  .cz-row-value {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 15px;
    color: var(--color-grey-dark);
  }
  .cz-row-chev { color: var(--color-grey-mid); margin-left: 2px; }
  .cz-toggle-advanced {
    display: block;
    margin: 28px auto 8px;
    background: none; border: 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--color-grey-dark);
    border-bottom: 1px solid var(--color-stroke-mid);
    padding-bottom: 4px;
    cursor: pointer;
    transition: color .15s ease;
  }
  .cz-toggle-advanced:hover { color: var(--color-jet); }

  .cz-cat-desc {
    padding: 16px 28px 6px;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 14.5px;
    color: var(--color-grey-dark);
    margin: 0;
    max-width: 480px;
    line-height: 1.55;
  }

  .cz-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px 28px 8px;
  }
  .cz-card {
    position: relative;
    background: var(--color-cream);
    border: 1px solid var(--color-stroke-light);
    padding: 0;
    cursor: pointer;
    display: flex; flex-direction: column;
    aspect-ratio: 1 / 1.18;
    transition: transform .25s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow .25s ease,
                border-color .15s ease;
  }
  .cz-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px -16px rgba(14, 15, 17, 0.18),
                0 4px 8px -6px rgba(182, 173, 165, 0.32);
  }
  .cz-card.is-selected {
    border-color: var(--color-jet);
    border-width: 1.5px;
  }
  .cz-card-check {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px;
    background: var(--color-jet); color: var(--color-white);
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cz-card-illust {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 14px 4px;
  }
  .cz-card-illust img {
    width: 100%; height: 100%; object-fit: contain;
    max-height: 140px;
  }
  .cz-card-label {
    display: block;
    text-align: center;
    font-size: 11.5px;
    color: var(--color-jet);
    padding: 8px 8px 14px;
    line-height: 1.4;
  }

  .cz-option-detail {
    padding: 20px 28px 8px;
    border-top: 1px solid var(--color-stroke-light);
    margin-top: 14px;
  }
  .cz-option-name {
    font-family: var(--font-serif);
    font-size: 18px;
    font-style: italic;
    color: var(--color-jet);
    margin: 0 0 6px;
  }
  .cz-option-desc {
    font-size: 13.5px;
    color: var(--color-grey-dark);
    margin: 0;
    line-height: 1.6;
  }

  .cz-monogram {
    padding: 20px 28px 6px;
    display: flex; flex-direction: column; gap: 18px;
    border-top: 1px solid var(--color-stroke-light);
  }
  .cz-monogram-field {
    display: flex; flex-direction: column; gap: 8px;
  }
  .cz-monogram-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--color-grey-mid);
  }
  .cz-monogram-input {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 24px;
    color: var(--color-jet);
    border: 0; border-bottom: 1px solid var(--color-stroke-mid);
    background: none;
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    width: 130px;
  }
  .cz-monogram-input:focus { outline: none; border-color: var(--color-jet); }
  .cz-thread-row { display: flex; gap: 12px; }
  .cz-thread {
    width: 28px; height: 28px;
    border: 0; border-radius: 999px;
    background: var(--thread-color);
    cursor: pointer;
    box-shadow: 0 0 0 1px var(--color-stroke-mid);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .cz-thread.is-selected {
    box-shadow: 0 0 0 2px var(--color-jet);
    transform: scale(1.12);
  }

  .cz-footer {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    padding: 18px 28px;
    border-top: 1px solid var(--color-stroke-light);
    background: var(--color-white);
    position: sticky; bottom: 0;
    z-index: 2;
  }
  .cz-price {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 19px;
    color: var(--color-jet);
  }
  .cz-cta {
    font-family: var(--font-sans);
    font-size: 11.5px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    padding: 14px 26px;
    background: var(--color-jet); color: var(--color-white);
    border: 1px solid var(--color-jet);
    cursor: pointer;
    transition: transform .25s cubic-bezier(0.22, 1, 0.36, 1),
                background-color .2s ease;
  }
  .cz-cta:hover {
    background: var(--color-jet);
    transform: translateY(-1px);
  }

  @media (max-width: 850px) {
    .cz-drawer { max-width: 100%; }
    .cz-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .cz-grid { grid-template-columns: 1fr; }
  }

  /* Toast */
  .crf-toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--color-jet); color: var(--color-white);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 18px;
    z-index: 100;
    transform: translateY(120%);
    opacity: 0;
    transition: transform .32s cubic-bezier(0.22, 1, 0.36, 1),
                opacity .25s ease;
    box-shadow: 0 16px 28px -16px rgba(14,15,17,0.4);
    max-width: calc(100vw - 48px);
  }
  .crf-toast.is-visible {
    transform: translateY(0);
    opacity: 1;
  }
  .crf-toast-text { font-family: var(--font-serif); font-style: italic; font-size: 14px; }
  .crf-toast-link {
    font-family: var(--font-sans);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    border-bottom: 1px solid var(--color-white);
    padding-bottom: 1px;
    color: var(--color-white);
  }
</style>
<link rel="stylesheet" href="css/mega-menu.css?v=2" />
<script src="js/mega-menu.js?v=2" defer></script>
</head>
<body>

<div data-layout="header" style="min-height:72px;background:var(--color-jet);"></div>

<!-- ============== BREADCRUMB ============== -->
<nav class="breadcrumb" id="breadcrumb">
  <a href="index.html">House</a><span class="sep">/</span>
  <a href="shop.html">Shop</a><span class="sep">/</span>
  <span id="crumb-leaf">Loading…</span>
</nav>

<!-- ============== MAIN LAYOUT ============== -->
<div class="product-layout" id="productLayout">

  <aside class="thumb-rail" id="thumbRail">
    <!-- populated by JS -->
  </aside>

  <section>
    <div class="main-image-wrap">
      <img id="mainImage" alt="" />
    </div>
    <p class="image-caption" id="imageCaption">Fabric close-up · model photography forthcoming</p>
  </section>

  <aside class="details-panel">
    <p class="eyebrow" id="itemEyebrow">&nbsp;</p>
    <h1 class="product-title" id="productTitle"><span class="loading-state">Loading…</span></h1>

    <div class="rating-row">
      <span class="rating-stars">★★★★★</span>
      <span class="rating-count">New release</span>
    </div>

    <div class="price-row">
      <span class="product-price" id="productPrice">&nbsp;</span>
      <span class="price-note">Bespoke, hand-finished</span>
    </div>

    <div class="design-label">
      <span class="label-left" id="designLabelLeft">Design</span>
      <span class="label-right" id="designLabelRight">&mdash;</span>
    </div>
    <div class="design-swatches" id="designSwatches"></div>

    <div id="sizeSelectors">
      <!-- size selects injected by JS depending on item type -->
    </div>

    <div class="cta-row is-single" id="ctaRow">
      <button class="btn btn--primary" id="customizeBtn" hidden>Customize Your Suit</button>
      <button class="btn btn--ghost" id="reserveBtn">Reserve Consultation</button>
    </div>

    <p class="bespoke-note">Every garment made to your measurements</p>

    <div class="accordion" id="accordion">
      <details open>
        <summary>Description</summary>
        <div class="acc-body" id="descBody"></div>
      </details>
      <details>
        <summary>Design &amp; Construction</summary>
        <div class="acc-body" id="designBody"></div>
      </details>
      <details>
        <summary>Fabric &amp; Care</summary>
        <div class="acc-body" id="fabricBody"></div>
      </details>
      <details>
        <summary>Separates in this Cloth</summary>
        <div class="acc-body" id="separatesBody"></div>
      </details>
      <details>
        <summary>Appointments &amp; Shipping</summary>
        <div class="acc-body" id="shipBody"></div>
      </details>
    </div>
  </aside>

</div>

<div data-layout="footer" style="min-height:480px;background:var(--color-charcoal);"></div>

<script type="module">
  import { fabricImageUrl, productImageUrl, supabase } from './js/data-loader.js';

  const ITEM_KIND = {
    'suits': 'Suit',
    'shirts': 'Shirt',
    'pants': 'Trouser',
    'coats': 'Coat',
    'jackets-blazers': 'Jacket',
    'mandarin-collar': 'Vest',
    'accessories': 'Accessory',
  };
  const fmtTHB = (n) => 'THB ' + n.toLocaleString('en-US');

  const params = new URLSearchParams(location.search);
  const itemTypeId   = params.get('item');
  const fabricTypeId = params.get('fabric');
  const wantDesignId = params.get('design');

  if (!itemTypeId || !fabricTypeId) {
    document.getElementById('productTitle').textContent = 'Missing product reference';
    document.getElementById('mainImage').alt = '';
    throw new Error('Missing item or fabric URL parameters');
  }

  async function fetchProductBundle() {
    // 1) all v_products rows for this item × fabric (these are the designs)
    const { data: rows, error: err1 } = await supabase
      .from('v_products')
      .select('*')
      .eq('item_type_id',   itemTypeId)
      .eq('fabric_type_id', fabricTypeId)
      .order('design_name');
    if (err1) throw err1;

    // 2) full fabric_types record (for the accordion details)
    const { data: ft, error: err2 } = await supabase
      .from('fabric_types').select('*').eq('id', fabricTypeId).single();
    if (err2) throw err2;

    // 3) other item types offered for this fabric (separates)
    const { data: separates, error: err3 } = await supabase
      .from('v_products')
      .select('item_type_id, item_type_name, fabric_type_id, fabric_design_id, price, primary_photo_path, design_name')
      .eq('fabric_type_id', fabricTypeId)
      .neq('item_type_id', itemTypeId);
    if (err3) throw err3;

    // Dedupe separates so we get one row per item_type
    const sepMap = new Map();
    separates.forEach(s => { if (!sepMap.has(s.item_type_id)) sepMap.set(s.item_type_id, s); });

    return { rows, fabric: ft, separates: [...sepMap.values()] };
  }

  function pickInitialDesign(rows) {
    if (wantDesignId) {
      const found = rows.find(r => r.fabric_design_id === wantDesignId);
      if (found) return found;
    }
    return rows[0];
  }

  function renderBreadcrumb(d) {
    const cat = (d.category_id || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    document.getElementById('crumb-leaf').innerHTML =
      `<a href="shop.html?category=${encodeURIComponent(d.category_id)}">${cat}</a><span class="sep">/</span>${d.item_type_name}`;
  }

  function renderHeader(rows, current) {
    const kind = ITEM_KIND[current.category_id] || current.item_type_name;
    const title = `The <em>${current.fabric_brand} ${current.fabric_family}</em> ${kind}`;
    document.getElementById('itemEyebrow').textContent = current.item_type_name;
    document.getElementById('productTitle').innerHTML = title;
    document.getElementById('productPrice').textContent = fmtTHB(current.price);
    document.getElementById('designLabelRight').textContent = current.design_name;
    document.title = `${current.fabric_brand} ${current.fabric_family} ${kind} — Country Road Fashions`;
  }

  function renderMainImage(d) {
    const main = document.getElementById('mainImage');
    if (d.primary_photo_path) {
      const newSrc = fabricImageUrl(d.primary_photo_path, { width: 1400 });
      if (main.src !== newSrc) {
        main.style.opacity = '0.5';
        main.src = newSrc;
        main.onload = () => { main.style.opacity = '1'; };
      }
      main.alt = `${d.fabric_brand} ${d.fabric_family} — ${d.design_name}`;
    } else {
      main.src = '';
      main.alt = '';
    }
    document.getElementById('imageCaption').textContent =
      `${d.fabric_brand} ${d.fabric_family} · ${d.design_name} · ${d.fabric_number}`;
  }

  function renderThumbRail(rows, current, activeHeroIdx = -1) {
    // activeHeroIdx: -1 marks the fabric thumb active (default); 0/1/… marks
    // the corresponding hero thumb active. Used by selectDesign() so that
    // clicking a swatch can land on hero #2 with the right thumb highlighted.
    const rail = document.getElementById('thumbRail');
    const heroes = current.design_hero_paths || [];

    // Hero thumbs first (model photos for this design), then the fabric closeup.
    const heroThumbs = heroes.map((p, i) => `
      <button class="${i === activeHeroIdx ? 'is-active' : ''}"
              data-photo-type="hero"
              data-photo="${fabricImageUrl(p, { width: 1400 })}"
              title="${current.design_name} — look ${i + 1}">
        <img src="${fabricImageUrl(p, { width: 200 })}" alt="${current.design_name} look ${i + 1}">
      </button>
    `).join('');

    const fabricThumb = current.primary_photo_path ? `
      <button class="${activeHeroIdx === -1 ? 'is-active' : ''}"
              data-photo-type="design"
              data-design="${current.fabric_design_id}"
              title="${current.design_name}">
        <img src="${fabricImageUrl(current.primary_photo_path, { width: 200 })}" alt="${current.design_name}">
      </button>
    ` : '';

    rail.innerHTML = heroThumbs + fabricThumb;
  }

  function renderSwatches(rows, current) {
    const wrap = document.getElementById('designSwatches');
    wrap.innerHTML = rows.map(d => `
      <button class="swatch-btn ${d.fabric_design_id === current.fabric_design_id ? 'is-active' : ''}"
              data-design="${d.fabric_design_id}"
              title="${d.design_name} · ${d.fabric_number}"
              aria-label="${d.design_name}">
        ${d.primary_photo_path
          ? `<img src="${fabricImageUrl(d.primary_photo_path, { width: 140 })}" alt="${d.design_name}">`
          : ''}
      </button>
    `).join('');
  }

  function renderSizeSelectors(itemTypeName) {
    const wrap = document.getElementById('sizeSelectors');
    const wantsJacket = /suit|jacket|blazer|coat|vest|tuxedo/i.test(itemTypeName);
    const wantsPants  = /suit|pant|trouser|chino|short/i.test(itemTypeName);
    const wantsShirt  = /shirt/i.test(itemTypeName);
    const blocks = [];
    if (wantsJacket) blocks.push(`<select class="size-select" disabled><option>Select Your Jacket Size — discussed in consultation</option></select>`);
    if (wantsPants)  blocks.push(`<select class="size-select" disabled><option>Select Your Trouser Size — discussed in consultation</option></select>`);
    if (wantsShirt)  blocks.push(`<select class="size-select" disabled><option>Select Your Shirt Size — discussed in consultation</option></select>`);
    if (!blocks.length) blocks.push(`<select class="size-select" disabled><option>Sized to your measurements</option></select>`);
    wrap.innerHTML = blocks.join('');
  }

  function renderAccordion(current, fabric, separates) {
    const kind = ITEM_KIND[current.category_id] || current.item_type_name;
    document.getElementById('descBody').innerHTML = `
      <p>The ${current.fabric_brand} ${current.fabric_family} ${kind} is a bespoke commission of Country Road Fashions — every panel cut to your individual measurements, hand-finished in our Bangkok atelier.</p>
      <p>This design — <em>${current.design_name}</em> (fabric No. ${current.fabric_number}) — is one of ${rowsCount(current.fabric_type_id)} cloths in this house. Your selection at consultation may include lining, lapel style, vent style, button stance, and monogram.</p>
    `;
    document.getElementById('designBody').innerHTML = `
      <dl>
        <dt>Construction</dt><dd>Full canvas, hand-padded lapel and chest piece</dd>
        <dt>Lapel</dt><dd>Notch (default) — refined in consultation</dd>
        <dt>Vent</dt><dd>Side vents (default) — refined in consultation</dd>
        <dt>Buttons</dt><dd>Genuine horn, 2-button (default)</dd>
        <dt>Lining</dt><dd>Bemberg cupro, half-canvas (default)</dd>
      </dl>
      <p style="margin-top:14px">Each cut is reviewed in fitting; you are invited to redraw the silhouette to your preference.</p>
    `;
    const seasons = (fabric.season || []).join(', ').replace(/-/g, ' ');
    document.getElementById('fabricBody').innerHTML = `
      <dl>
        <dt>Composition</dt><dd>${fabric.composition || '—'}</dd>
        <dt>Origin</dt><dd>${fabric.origin || '—'}</dd>
        <dt>Weight</dt><dd>${fabric.weight_gsm ? fabric.weight_gsm + ' gsm' : '—'}</dd>
        <dt>Season</dt><dd>${seasons || '—'}</dd>
        <dt>House</dt><dd>${fabric.brand} — ${fabric.family}</dd>
      </dl>
      <p style="margin-top:14px">Dry clean only. Hang on a wide wooden hanger; rest the garment 24 hours between wearings.</p>
    `;
    if (separates && separates.length) {
      document.getElementById('separatesBody').innerHTML = `
        <p>Other garments offered in the same ${fabric.brand} ${fabric.family} cloth:</p>
        <div class="separates-list">
          ${separates.map(s => `
            <a href="product.html?item=${encodeURIComponent(s.item_type_id)}&fabric=${encodeURIComponent(s.fabric_type_id)}&design=${encodeURIComponent(s.fabric_design_id)}">
              <span class="item">${s.item_type_name} <em>· ${fmtTHB(s.price)}</em></span>
              <span class="arrow">→</span>
            </a>
          `).join('')}
        </div>
      `;
    } else {
      document.getElementById('separatesBody').innerHTML = `<p>No other garments offered in this cloth at present.</p>`;
    }
    document.getElementById('shipBody').innerHTML = `
      <p><strong style="color:var(--color-jet);font-weight:400">Consultations.</strong> In-person at our Bangkok atelier (Sukhumvit) or by video. <a href="book-appointment.html" style="text-decoration:underline">Book a visit →</a></p>
      <p><strong style="color:var(--color-jet);font-weight:400">Production.</strong> Hand-finished in 4–6 weeks following first fitting; final fitting and delivery follow.</p>
      <p><strong style="color:var(--color-jet);font-weight:400">Worldwide shipping.</strong> Trunk shows arrive in Singapore, Madrid, New York, London on rotation.</p>
    `;
  }

  // tiny helper to expose row count to descBody
  let rowCountCache = 0;
  function rowsCount() { return rowCountCache; }

  let state = { rows: [], fabric: null, separates: [], current: null };

  function selectDesign(designId, opts = {}) {
    const next = state.rows.find(r => r.fabric_design_id === designId);
    if (!next) return;
    state.current = next;

    // When a swatch is clicked we want to land on the close-up hero (#2),
    // not the fabric photo. Fall back gracefully if a design has fewer hero
    // photos available.
    const heroes = next.design_hero_paths || [];
    const useHero = !!opts.preferHero && heroes.length > 0;
    // Prefer hero #2 (index 1); if only one hero exists, use it.
    const heroIdx = useHero ? Math.min(1, heroes.length - 1) : -1;

    if (useHero) {
      const main = document.getElementById('mainImage');
      const newSrc = fabricImageUrl(heroes[heroIdx], { width: 1400 });
      if (main.src !== newSrc) {
        main.style.opacity = '0.5';
        main.src = newSrc;
        main.onload = () => { main.style.opacity = '1'; };
      }
      main.alt = `${next.fabric_brand} ${next.fabric_family} — ${next.design_name} · look ${heroIdx + 1}`;
      document.getElementById('imageCaption').textContent =
        `${next.fabric_brand} ${next.fabric_family} · ${next.design_name} · look book`;
    } else {
      renderMainImage(next);
    }

    renderSwatches(state.rows, next);
    renderThumbRail(state.rows, next, heroIdx);
    document.getElementById('productPrice').textContent = fmtTHB(next.price);
    document.getElementById('designLabelRight').textContent = next.design_name;
    const u = new URL(location.href);
    u.searchParams.set('design', designId);
    history.replaceState(null, '', u.pathname + '?' + u.searchParams.toString());
  }

  async function init() {
    try {
      const bundle = await fetchProductBundle();
      if (!bundle.rows.length) {
        document.getElementById('productTitle').textContent = 'Garment not found';
        return;
      }
      state.rows = bundle.rows;
      state.fabric = bundle.fabric;
      state.separates = bundle.separates;
      state.current = pickInitialDesign(bundle.rows);
      rowCountCache = bundle.rows.length;
      window.__crfState = state;

      renderBreadcrumb(state.current);
      renderHeader(state.rows, state.current);
      renderMainImage(state.current);
      renderThumbRail(state.rows, state.current);
      renderSwatches(state.rows, state.current);
      renderSizeSelectors(state.current.item_type_name);
      renderAccordion(state.current, state.fabric, state.separates);
      window.dispatchEvent(new CustomEvent('crf:pdp-ready'));

      // Wire interactions
      document.getElementById('designSwatches').addEventListener('click', (e) => {
        const b = e.target.closest('.swatch-btn');
        if (b) selectDesign(b.dataset.design, { preferHero: true });
      });
      document.getElementById('thumbRail').addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        if (b.dataset.photoType === 'hero') {
          // Swap main image to the hero shot, mark this thumb active.
          document.querySelectorAll('#thumbRail button').forEach(x => x.classList.remove('is-active'));
          b.classList.add('is-active');
          const main = document.getElementById('mainImage');
          main.style.opacity = '0.5';
          main.src = b.dataset.photo;
          main.onload = () => { main.style.opacity = '1'; };
          document.getElementById('imageCaption').textContent =
            `${state.current.fabric_brand} ${state.current.fabric_family} — ${state.current.item_type_name} · look book`;
        } else if (b.dataset.photoType === 'design') {
          selectDesign(b.dataset.design);
        }
      });
      document.getElementById('reserveBtn').addEventListener('click', () => {
        const u = new URL('book-appointment.html', location.origin);
        u.searchParams.set('product', state.current.product_id);
        location.href = u.pathname + '?' + u.searchParams.toString();
      });
    } catch (err) {
      console.error(err);
      document.getElementById('productTitle').textContent = 'Unable to load this garment.';
    }
  }

  init();
</script>

<!-- ============== CUSTOMIZER DRAWER ============== -->
<div class="cz-backdrop" id="customizerBackdrop" data-cz-close></div>
<aside class="cz-drawer" id="customizerDrawer" aria-label="Customize Your Suit" aria-hidden="true"></aside>

<!-- ============== CART BADGE + CUSTOMIZER WIRING ============== -->
<script type="module">
  import './js/cart.js';
  // Customize button: lazy-load drawer module on first click
  const customizeBtn = document.getElementById('customizeBtn');
  if (customizeBtn) {
    customizeBtn.addEventListener('click', async () => {
      // `state` is module-scoped in the script above. Read it via window-attached hook:
      const s = window.__crfState;
      if (!s || !s.current) return;
      const { openCustomizer } = await import('./js/customizer.js');
      const brand = s.fabric?.brand || '';
      const family = s.fabric?.family || '';
      openCustomizer({
        item_type_id: s.current.item_type_id,
        fabric_design_id: s.current.fabric_design_id,
        price_thb: s.current.price,
        fabric_design_name: s.current.design_name,
        fabric_type_name: `${brand} ${family}`.trim(),
      });
    });
  }
  // Toggle customizer visibility based on item type
  window.addEventListener('crf:pdp-ready', () => {
    const s = window.__crfState;
    const btn = document.getElementById('customizeBtn');
    const row = document.getElementById('ctaRow');
    if (!btn || !s?.current) return;
    if (s.current.item_type_id === 'formal-suit-2-piece') {
      btn.hidden = false;
      row?.classList.remove('is-single');
    } else {
      btn.hidden = true;
      row?.classList.add('is-single');
    }
  });
</script>

</body>
</html>
